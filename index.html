<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Home Plate Studio - Pitcher Sync</title>

    <!-- TensorFlow.js & MoveNet -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030712; /* より深い超ダークネイビー */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: row;
            transition: flex-direction 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 映像要素 */
        iframe, video, #player, #webcam {
            background-color: #030712;
        }

        /* 自分のカメラ映像 */
        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; 
            transform: scaleX(-1);
            z-index: 1;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* プロの投球映像コンテナ */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #player {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1); 
        }

        /* --- 画面モード（レイアウトCSS） --- */
        .video-container.mode-overlay {
            top: 0; left: 0; width: 100%; height: 100%; opacity: 0.5; 
        }
        body.mode-overlay-active #webcam {
            top: 0; left: 0; width: 100%; height: 100%;
        }
        
        .video-container.mode-mini {
            top: 20px; left: calc(100vw - 25vw - 20px); width: 25vw; height: calc(25vw * 9 / 16);
            opacity: 1.0 !important; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
            border-radius: 6px; overflow: hidden; border: 1px solid rgba(0, 255, 136, 0.5); pointer-events: auto;
        }
        body.mode-mini-active #webcam {
            top: 0; left: 0; width: 100%; height: 100%;
        }
        
        .video-container.mode-split-h { 
            top: 0; left: 0; width: 50vw; height: 100vh; opacity: 1.0 !important; pointer-events: auto; 
        }
        body.split-h-active #webcam { 
            top: 0; left: 50vw; width: 50vw; height: 100vh; 
        }
        
        .video-container.mode-split-v { 
            top: 0; left: 0; width: 100vw; height: 50vh; opacity: 1.0 !important; pointer-events: auto; 
        }
        body.split-v-active #webcam { 
            top: 50vh; left: 0; width: 100vw; height: 50vh; 
        }

        .video-container.mirrored #player { transform: scaleX(-1); }
        iframe { width: 100%; height: 100%; border: none; }

        /* 骨格キャンバス */
        #poseCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 3;
            pointer-events: none;
            display: none;
        }

        /* --- 刷新：サイバーミニマル・コントロールバー --- */
        .controls-container {
            position: absolute;
            bottom: 16px; /* 画面下部にスリムに配置 */
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            width: max-content;
            max-width: 98%;
            pointer-events: none;
        }

        .control-group {
            pointer-events: auto;
            background: rgba(8, 12, 24, 0.75); /* より高い透明度をもつガラスエフェクト */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom: 2px solid rgba(0, 255, 136, 0.4); /* 下部に超薄型の発光ライン */
            padding: 6px 14px; /* 縦幅を限界まで削減 */
            border-radius: 30px; /* 角を落として近未来的なカプセル形状に */
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .group-divider {
            width: 1px;
            height: 16px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 4px;
        }

        /* ミニマルURL入力エリア */
        .controls-container input[type="text"] {
            width: 110px;
            padding: 5px 10px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #ffffff;
            font-size: 11px;
            outline: none;
            transition: all 0.2s ease;
        }
        .controls-container input[type="text"]:focus {
            border-color: rgba(0, 255, 136, 0.5);
            width: 140px; /* フォーカス時のみ少し広がるスマートUI */
        }

        /* 近未来的フラットボタン */
        .btn-mlb {
            padding: 5px 11px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 10px;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            white-space: nowrap;
        }

        .btn-mlb:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* プリセット選択用の少し落ち着いたデザイン */
        .btn-preset {
            background: rgba(0, 255, 136, 0.04);
            border: 1px solid rgba(0, 255, 136, 0.15);
            color: rgba(0, 255, 136, 0.85);
        }
        .btn-preset:hover {
            background: rgba(0, 255, 136, 0.12);
            color: #00ff88;
        }

        /* メインの読み込み・アクティブ状態（鮮烈なサイバーグリーン） */
        .btn-load {
            background: #00a86b;
            color: #ffffff;
            border: none;
        }
        .btn-load:hover {
            background: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.4);
        }

        /* アクティブ・トグル状態 */
        .btn-active {
            background: rgba(0, 255, 136, 0.2) !important;
            color: #00ff88 !important;
            border: 1px solid rgba(0, 255, 136, 0.4) !important;
            text-shadow: 0 0 4px rgba(0, 255, 136, 0.5);
        }

        .disabled-ui {
            opacity: 0.2;
            pointer-events: none;
        }

        /* スリムスライダー */
        .controls-container label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 9px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.5px;
            white-space: nowrap;
            margin-left: 4px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 3px; /* 限界までスリムに */
            width: 60px;
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            background: #00ff88;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 6px #00ff88;
            transition: transform 0.1s ease;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }
    </style>
</head>
<body class="mode-overlay-active">

    <!-- プロの投球映像 (YouTube) -->
    <div class="video-container mode-overlay" id="videoContainer">
        <div id="player"></div>
    </div>

    <!-- 自分の打撃映像 (Webcam) -->
    <video id="webcam" autoplay playsinline></video>
    
    <!-- 骨格描画用キャンバス -->
    <canvas id="poseCanvas"></canvas>

    <!-- 下部操作メニュー（1列のミニマルデザインに集約） -->
    <div class="controls-container">
        <div class="control-group">
            <!-- プリセット切替 -->
            <button class="btn-mlb btn-preset btn-active" id="preset1" onclick="loadPresetVideo('lFxjc-gulUk', 'preset1')">PITCHER</button>
            <button class="btn-mlb btn-preset" id="preset2" onclick="loadPresetVideo('O4qTiUaqFV0', 'preset2')">OTANI</button>
            
            <div class="group-divider"></div>

            <!-- URL読み込み -->
            <input type="text" id="youtubeUrl" placeholder="PASTE URL...">
            <button class="btn-mlb btn-load" onclick="loadVideo()">LOAD</button>
            
            <div class="group-divider"></div>

            <!-- 再生制御コア -->
            <button class="btn-mlb" onclick="seekRelative(-10)">-10s</button>
            <button class="btn-mlb" id="playPauseBtn" onclick="togglePlay()">PAUSE</button>
            <button class="btn-mlb" onclick="seekRelative(10)">+10s</button>
            
            <div class="group-divider"></div>

            <!-- アプリケーション設定系 -->
            <button class="btn-mlb" id="speedBtn" onclick="toggleSpeed()">1.0x</button>
            <button class="btn-mlb" id="modeBtn" onclick="toggleMode()">OVERLAY</button>
            <button class="btn-mlb" id="mirrorBtn" onclick="toggleYoutubeMirror()">MIRROR</button>
            <button class="btn-mlb" id="poseBtn" onclick="togglePose()">POSE</button>
            
            <!-- 不透明度調整 -->
            <label id="opacityLabel">
                OPC
                <input type="range" id="opacitySlider" min="0.1" max="1.0" step="0.05" value="0.5" oninput="changeOpacity(this.value)">
            </label>
        </div>
    </div>

    <script>
        let currentOpacity = 0.5;
        let isMirrored = false;
        let player = null;
        let isPlayerReady = false;
        let detector = null;
        let poseActive = false;

        let currentModeIndex = 0; 
        const modes = ["OVERLAY", "MINI", "SPLIT: H", "SPLIT: V"];[cite: 1]

        const canvasElement = document.getElementById('poseCanvas');
        const canvasCtx = canvasElement.getContext('2d');
        const videoElement = document.getElementById('webcam');
        let smoothedKeypoints = [];

        // 1. カメラ初期化
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                videoElement.srcObject = stream;
            } catch (error) {
                console.error('カメラの取得に失敗しました:', error);
            }
        }
        window.addEventListener('DOMContentLoaded', initCamera);

        // 2. YouTube Iframe API 初期化
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'lFxjc-gulUk',
                playerVars: { 
                    'autoplay': 0, 
                    'controls': 0, 
                    'rel': 0, 
                    'origin': location.origin 
                },
                events: { 
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange 
                }
            });
        }
        
        function onPlayerReady(event) {
            isPlayerReady = true;
        }

        function onPlayerStateChange(event) {
            const btn = document.getElementById('playPauseBtn');
            if (!btn) return;
            if (event.data === YT.PlayerState.PLAYING) { 
                btn.innerText = "PAUSE"; 
            } else { 
                btn.innerText = "PLAY"; 
            }
        }
        
        // 3. 各種ハンドリング関数
        function loadVideo() {
            const input = document.getElementById('youtubeUrl').value;
            let videoId = input;
            if (input.includes('v=')) { videoId = input.split('v=')[1].split('&')[0]; }
            else if (input.includes('youtu.be/')) { videoId = input.split('youtu.be/')[1].split('?')[0]; }
        
            if (videoId && player && isPlayerReady) {
                player.loadVideoById({ videoId: videoId });
                document.getElementById('playPauseBtn').innerText = "PAUSE";
                
                document.getElementById('preset1').classList.remove('btn-active');
                document.getElementById('preset2').classList.remove('btn-active');
            } else {
                alert('有効なYouTubeのURLを入力してください。');
            }
        }

        function loadPresetVideo(videoId, targetBtnId) {
            if (player && isPlayerReady) {
                player.loadVideoById({ videoId: videoId });
                document.getElementById('playPauseBtn').innerText = "PAUSE";

                document.getElementById('preset1').classList.remove('btn-active');
                document.getElementById('preset2').classList.remove('btn-active');
                document.getElementById(targetBtnId).classList.add('btn-active');
            }
        }
        
        function togglePlay() {
            if (!player || !isPlayerReady) return;
            const state = player.getPlayerState();
            if (state === YT.PlayerState.PLAYING) { 
                player.pauseVideo(); 
            } else { 
                player.playVideo(); 
            }
        }

        function seekRelative(seconds) {
            if (!player || !isPlayerReady) return;
            player.seekTo(player.getCurrentTime() + seconds, true);
        }

        let currentSpeed = 1.0;[cite: 1]
        function toggleSpeed() {
            if (!player || !isPlayerReady) return;
            currentSpeed = currentSpeed === 1.0 ? 0.75 : (currentSpeed === 0.75 ? 0.5 : 1.0);[cite: 1]
            player.setPlaybackRate(currentSpeed);[cite: 1]
            document.getElementById('speedBtn').innerText = `${currentSpeed}x`;[cite: 1]
            
            if (currentSpeed !== 1.0) {
                document.getElementById('speedBtn').classList.add('btn-active');
            } else {
                document.getElementById('speedBtn').classList.remove('btn-active');
            }
        }

        function toggleMode() {
            const container = document.getElementById('videoContainer');[cite: 1]
            const modeBtn = document.getElementById('modeBtn');[cite: 1]
            const opacityLabel = document.getElementById('opacityLabel');[cite: 1]
            const body = document.body;[cite: 1]
        
            currentModeIndex = (currentModeIndex + 1) % modes.length;[cite: 1]
            const activeMode = modes[currentModeIndex];[cite: 1]
            modeBtn.innerText = activeMode;
        
            container.className = "video-container";[cite: 1]
            body.className = "";[cite: 1]
            container.style.opacity = "";[cite: 1]
            opacityLabel.classList.add('disabled-ui');[cite: 1]
        
            if (isMirrored) container.classList.add('mirrored');[cite: 1]
            if (activeMode !== "OVERLAY") modeBtn.classList.add('btn-active');
            else modeBtn.classList.remove('btn-active');
        
            if (activeMode === "OVERLAY") {[cite: 1]
                container.classList.add('mode-overlay');[cite: 1]
                body.classList.add('mode-overlay-active');[cite: 1]
                container.style.opacity = currentOpacity;[cite: 1]
                opacityLabel.classList.remove('disabled-ui');[cite: 1]
            } else if (activeMode === "MINI") {[cite: 1]
                container.classList.add('mode-mini');[cite: 1]
                body.classList.add('mode-mini-active');[cite: 1]
            } else if (activeMode === "SPLIT: H") {[cite: 1]
                body.classList.add('split-h-active');[cite: 1]
                container.classList.add('mode-split-h');[cite: 1]
            } else if (activeMode === "SPLIT: V") {[cite: 1]
                body.classList.add('split-v-active');[cite: 1]
                container.classList.add('mode-split-v');[cite: 1]
            }
        }

        function toggleYoutubeMirror() {
            isMirrored = !isMirrored; 
            const container = document.getElementById('videoContainer');
            const btn = document.getElementById('mirrorBtn');
            container.classList.toggle('mirrored', isMirrored);[cite: 1]
            
            if(isMirrored) {
                btn.classList.add('btn-active');
            } else {
                btn.classList.remove('btn-active');
            }
        }

        function changeOpacity(value) {
            currentOpacity = value;
            const container = document.getElementById('videoContainer');
            if (container.classList.contains('mode-overlay')) {[cite: 1]
                container.style.opacity = value;[cite: 1]
            }
        }

        // ショートカット
        document.addEventListener('keydown', (event) => {
            if (document.activeElement.tagName === 'INPUT') return;
            if (event.code === 'Space') { event.preventDefault(); togglePlay(); }
            else if (event.code === 'ArrowLeft') { event.preventDefault(); seekRelative(-10); }
            else if (event.code === 'ArrowRight') { event.preventDefault(); seekRelative(10); }
        });

        // 4. MoveNet 骨格ロジック
        async function initPoseDetection() {
            if (window.tf) { tf.env().set('WEBGL_FLUSH_THRESHOLD', -1); }[cite: 1]
            detector = await poseDetection.createDetector([cite: 1]
                poseDetection.SupportedModels.MoveNet,[cite: 1]
                { modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING }[cite: 1]
            );
            renderLoop();[cite: 1]
        }

        const connections = [
            [5, 6], [5, 7], [7, 9], [6, 8], [8, 10],
            [5, 11], [6, 12], [11, 12],
            [11, 13], [13, 15], [12, 14], [14, 16]
        ];

        async function renderLoop() {
            if (!detector) return;
            if (!poseActive) {
                requestAnimationFrame(renderLoop);
                return;
            }

            if (canvasElement.width !== window.innerWidth || canvasElement.height !== window.innerHeight) {
                canvasElement.width = window.innerWidth;
                canvasElement.height = window.innerHeight;
            }
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            const activeMode = modes[currentModeIndex];[cite: 1]
            let camAreaWidth = canvasElement.width;[cite: 1]
            let camAreaHeight = canvasElement.height;[cite: 1]
            let camBaseOffsetX = 0;[cite: 1]
            let camBaseOffsetY = 0;[cite: 1]

            if (activeMode === "SPLIT: H") {[cite: 1]
                camAreaWidth = canvasElement.width / 2;[cite: 1]
                camBaseOffsetX = canvasElement.width / 2;[cite: 1]
            }[cite: 1]
            else if (activeMode === "SPLIT: V") {[cite: 1]
                camAreaHeight = canvasElement.height / 2;[cite: 1]
                camBaseOffsetY = canvasElement.height / 2;[cite: 1]
            }[cite: 1]

            const videoRatio = videoElement.videoWidth / videoElement.videoHeight;
            const areaRatio = camAreaWidth / camAreaHeight;[cite: 1]
            let scale;
            let offsetX = 0;
            let offsetY = 0;

            if (areaRatio > videoRatio) {
                scale = camAreaHeight / videoElement.videoHeight;[cite: 1]
                offsetX = (camAreaWidth - (videoElement.videoWidth * scale)) / 2;[cite: 1]
            } else {
                scale = camAreaWidth / videoElement.videoWidth;[cite: 1]
                offsetY = (camAreaHeight - (videoElement.videoHeight * scale)) / 2;[cite: 1]
            }

            const finalCamOffsetX = camBaseOffsetX + offsetX;[cite: 1]
            const finalCamOffsetY = camBaseOffsetY + offsetY;[cite: 1]

            if (videoElement.readyState >= 2 && videoElement.videoWidth > 0) {
                const poses = await detector.estimatePoses(videoElement);[cite: 1]

                if (poses.length > 0) {
                    const currentPose = poses[0];[cite: 1]
                    
                    if (smoothedKeypoints.length === 0) {
                        smoothedKeypoints = JSON.parse(JSON.stringify(currentPose.keypoints));[cite: 1]
                    } else {
                        for (let i = 0; i < currentPose.keypoints.length; i++) {
                            const kp = currentPose.keypoints[i];
                            if (kp.score > 0.15) {
                                smoothedKeypoints[i].x = smoothedKeypoints[i].x * 0.6 + kp.x * 0.4;[cite: 1]
                                smoothedKeypoints[i].y = smoothedKeypoints[i].y * 0.6 + kp.y * 0.4;[cite: 1]
                                smoothedKeypoints[i].score = kp.score;[cite: 1]
                            }
                        }
                    }

                    const getMirroredX = (rawX) => {
                        return (videoElement.videoWidth - rawX) * scale + finalCamOffsetX;[cite: 1]
                    };

                    canvasCtx.save();
                    for (let i = 0; i < connections.length; i++) {
                        const pt1 = smoothedKeypoints[connections[i][0]];[cite: 1]
                        const pt2 = smoothedKeypoints[connections[i][1]];[cite: 1]
                        
                        if (pt1 && pt2 && pt1.score > 0.20 && pt2.score > 0.20) {
                            const x1 = getMirroredX(pt1.x);[cite: 1]
                            const y1 = pt1.y * scale + finalCamOffsetY;[cite: 1]
                            const x2 = getMirroredX(pt2.x);[cite: 1]
                            const y2 = pt2.y * scale + finalCamOffsetY;[cite: 1]

                            canvasCtx.beginPath();
                            canvasCtx.moveTo(x1, y1);
                            canvasCtx.lineTo(x2, y2);
                            canvasCtx.strokeStyle = '#00ff88'; /* サイバーネオングリーン */[cite: 1]
                            canvasCtx.lineWidth = 6; /* 骨格の線も少しスタイリッシュに細く調整 */
                            canvasCtx.lineCap = 'round';[cite: 1]
                            canvasCtx.shadowColor = '#00ff88';[cite: 1]
                            canvasCtx.shadowBlur = 10;
                            canvasCtx.stroke();
                        }
                    }

                    smoothedKeypoints.forEach((kp) => {
                        if (kp.score > 0.20) {
                            const cx = getMirroredX(kp.x);[cite: 1]
                            const cy = kp.y * scale + finalCamOffsetY;[cite: 1]
                            canvasCtx.beginPath();
                            canvasCtx.arc(cx, cy, 4, 0, 2 * Math.PI);
                            canvasCtx.fillStyle = '#ffffff';[cite: 1]
                            canvasCtx.fill();
                        }
                    });
                    canvasCtx.restore();
                }
            }
            requestAnimationFrame(renderLoop);
        }

        async function togglePose() {
            poseActive = !poseActive;[cite: 1]
            const btn = document.getElementById('poseBtn');
            if (poseActive) {
                canvasElement.style.display = 'block';[cite: 1]
                btn.innerText = "LOAD..."; 
                btn.disabled = true;[cite: 1]
                if (!detector) {[cite: 1]
                    await initPoseDetection();[cite: 1]
                }
                btn.disabled = false;[cite: 1]
                btn.innerText = "POSE";
                btn.classList.add('btn-active');
            } else {
                canvasElement.style.display = 'none';[cite: 1]
                btn.innerText = "POSE";
                btn.classList.remove('btn-active');
            }
        }
    </script>
</body>
</html>
