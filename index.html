<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>MLB Home Plate Studio</title>

    <link rel="stylesheet" href="style.css">

    <!-- TensorFlow -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
</head>

<body class="mode-overlay-active">

    <!-- YouTube -->
    <div id="videoContainer" class="video-container mode-overlay">
        <div id="player"></div>
    </div>

    <!-- Camera -->
    <video
        id="webcam"
        autoplay
        muted
        playsinline>
    </video>

    <!-- Pose -->
    <canvas id="poseCanvas"></canvas>

    <!-- Hidden JSON -->
    <input
        id="jsonFileInput"
        type="file"
        accept=".json"
        hidden>

    <!-- UI -->
    <div class="controls-container">

        <div class="control-group">

            <!-- Preset -->

            <button
                id="preset1"
                class="btn-mlb btn-preset btn-active">
                PITCHER
            </button>

            <button
                id="preset2"
                class="btn-mlb btn-preset">
                OTANI
            </button>

            <div class="group-divider"></div>

            <!-- URL -->

            <input
                id="youtubeUrl"
                type="text"
                placeholder="Paste YouTube URL">

            <button
                id="loadBtn"
                class="btn-mlb btn-load">
                LOAD
            </button>

            <div class="group-divider"></div>

            <!-- Player -->

            <button id="backBtn" class="btn-mlb">
                -10s
            </button>

            <button id="playPauseBtn" class="btn-mlb">
                PLAY
            </button>

            <button id="forwardBtn" class="btn-mlb">
                +10s
            </button>

            <div class="group-divider"></div>

            <!-- View -->

            <button
                id="speedBtn"
                class="btn-mlb">
                1.0x
            </button>

            <button
                id="modeBtn"
                class="btn-mlb">
                OVERLAY
            </button>

            <button
                id="mirrorBtn"
                class="btn-mlb">
                MIRROR
            </button>

            <button
                id="poseBtn"
                class="btn-mlb">
                POSE
            </button>

            <button
                id="jsonBtn"
                class="btn-mlb">
                JSON
            </button>

            <label id="opacityLabel">

                OPC

                <input
                    id="opacitySlider"
                    type="range"
                    min="0.1"
                    max="1.0"
                    step="0.05"
                    value="0.5">

            </label>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
